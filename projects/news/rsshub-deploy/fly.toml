# Fly.io deployment for BIAV self-hosted RSSHub
#
# 前置条件：
#   1. 已安装 flyctl（https://fly.io/docs/hands-on/install-flyctl/）
#   2. 已登录：flyctl auth login
#   3. 已创建 app：flyctl apps create biav-rsshub（或改下面的 app 名字）
#
# 部署：
#   cd projects/news/rsshub-deploy
#   flyctl deploy -c fly.toml
#
# 设置 cookie secrets（不可跳过，否则 weibo/zhihu/xhs 等路由仍会 503）：
#   见 .env.example，然后：
#   flyctl secrets set -c fly.toml \
#     WEIBO_COOKIE="SUB=..." \
#     ZHIHU_COOKIES="z_c0=..." \
#     PIXIV_REFRESHTOKEN="..."
#
# 部署完后：
#   - 新的 RSSHub URL 是 https://biav-rsshub.fly.dev
#   - 在 GitHub 仓库 Settings → Secrets → Actions 里设 RSSHUB_URL 为这个地址
#   - 用 python projects/news/scripts/test_rsshub.py https://biav-rsshub.fly.dev 验证

app = "biav-rsshub"
primary_region = "nrt"  # 东京，离 CN/JP/KR 平台最近；iad/ams 也是备选
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  image = "diygod/rsshub:chromium-bundled"
  # chromium-bundled 版本自带 Puppeteer，weibo/xhs/douyin/pixiv 这些需要浏览器渲染的路由都能跑
  # 如果 SHM 不够可以换 chromium-latest（外部 Chrome）

[env]
  NODE_ENV = "production"
  CACHE_TYPE = "memory"       # Fly free tier 不要 redis
  CACHE_EXPIRE = "1800"        # 30min — 我们一小时采一次，半小时缓存足够
  PUPPETEER_WS_ENDPOINT = ""   # 内置 chromium，无需外部
  REQUEST_RETRY = "2"
  REQUEST_TIMEOUT = "30000"
  LOGGER_LEVEL = "info"
  # 允许的 UA（可选白名单，目前开放）
  ALLOW_USER_HOTLINK_TEMPLATE = "{filename}"

[http_service]
  internal_port = 1200
  force_https = true
  auto_stop_machines = true    # 空闲时自动停机省钱（每次启动 5~10s）
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

# 健康检查：访问根路径，RSSHub 返回状态页
[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"
  method = "get"
  path = "/"

# Free tier 单机配置：shared-cpu-1x + 256MB 勉强够跑无头 Chrome
# 如果 OOM 再升到 512MB（shared-cpu-1x-512mb，仍然 free）
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
