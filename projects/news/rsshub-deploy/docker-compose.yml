# Docker Compose for BIAV self-hosted RSSHub
#
# 用途：
#   1. 本地开发调试（macOS/Linux 有 Docker 即可）
#   2. 部署到任意 VPS（阿里云 / Vultr / Hetzner …）
#   3. 部署到 Railway（railway up）或 Render（连接 Docker Compose）
#
# 使用：
#   cd projects/news/rsshub-deploy
#   cp .env.example .env            # 然后编辑 .env，填入 cookie
#   docker compose up -d
#   curl http://localhost:1200/telegram/channel/Morimens?format=json
#
# 新实例 URL（按你的部署方式）：
#   - 本地：http://localhost:1200
#   - VPS：http://<your-vps-ip>:1200（建议前面挂 nginx + HTTPS）
#   - Railway：<project>.up.railway.app
#
# 部署完后：
#   - 在 GitHub Secrets 设 RSSHUB_URL
#   - 跑 python projects/news/scripts/test_rsshub.py <url> 验证

services:
  rsshub:
    # chromium-bundled 自带无头浏览器，weibo/xhs/douyin/pixiv 路由才能跑
    image: diygod/rsshub:chromium-bundled
    container_name: biav-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory       # 生产建议改 redis（见下方注释）
      CACHE_EXPIRE: "1800"
      REQUEST_RETRY: "2"
      REQUEST_TIMEOUT: "30000"
      LOGGER_LEVEL: info
      # 从 .env 读取的 cookie/token secrets
      # 未设置的平台路由会在 RSSHub 运行时自动 fallback 或返回空
      WEIBO_COOKIE: ${WEIBO_COOKIE:-}
      ZHIHU_COOKIES: ${ZHIHU_COOKIES:-}
      PIXIV_REFRESHTOKEN: ${PIXIV_REFRESHTOKEN:-}
      XIAOHONGSHU_COOKIE: ${XIAOHONGSHU_COOKIE:-}
      TWITTER_USERNAME: ${TWITTER_USERNAME:-}
      TWITTER_PASSWORD: ${TWITTER_PASSWORD:-}
      TELEGRAM_SESSION: ${TELEGRAM_SESSION:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1200/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # chromium 需要更多 shm 避免 /dev/shm full 导致渲染失败
    shm_size: "1gb"

  # 可选：Redis 缓存（生产推荐，避免每次请求都去跑 Puppeteer）
  # 启用方法：把下面这段的 # 去掉，然后把 rsshub.environment 里 CACHE_TYPE 改成 redis
