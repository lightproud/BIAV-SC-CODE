<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在 | 缸中之脑</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0b10'/%3E%3Ctext x='32' y='46' font-family='Noto Serif SC,serif' font-weight='700' font-size='44' fill='%23c5a356' text-anchor='middle'%3E夜%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0b10;
      color: #f0ebe0;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 560px;
      width: 100%;
    }

    .error-code {
      font-family: 'Noto Serif SC', serif;
      font-weight: 700;
      font-size: 8rem;
      line-height: 1;
      color: #e2c97e;
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: #e2c97e;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }

    .message {
      font-size: 1rem;
      color: #b5aa98;
      margin-bottom: 3rem;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 4rem;
    }

    .nav-links a {
      display: block;
      padding: 0.75rem 2rem;
      background: #0f1018;
      border: 1px solid rgba(197, 163, 86, 0.08);
      border-radius: 6px;
      color: #b5aa98;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      min-width: 120px;
    }

    .nav-links a:hover {
      border-color: rgba(197, 163, 86, 0.18);
      color: #e2c97e;
      background: rgba(197, 163, 86, 0.06);
    }

    .nav-links .label-zh {
      display: block;
      font-size: 0.95rem;
    }

    .nav-links .label-en {
      display: block;
      font-size: 0.75rem;
      color: #7a7265;
      margin-top: 0.15rem;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      font-size: 0.8rem;
      color: #7a7265;
      letter-spacing: 0.08em;
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 5rem;
      }

      h1 {
        font-size: 1.2rem;
      }

      .nav-links {
        flex-direction: column;
        align-items: center;
      }

      .nav-links a {
        width: 100%;
        max-width: 240px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="error-code">404</div>
    <h1>页面不存在 / Page Not Found</h1>
    <p class="message">你要找的页面可能已被移动或不存在。</p>
    <nav class="nav-links">
      <a href="/brain-in-a-vat/">
        <span class="label-zh">首页</span>
        <span class="label-en">Home</span>
      </a>
      <a href="/brain-in-a-vat/wiki/">
        <span class="label-zh">Wiki</span>
        <span class="label-en">Wiki</span>
      </a>
      <a href="/brain-in-a-vat/news/">
        <span class="label-zh">新闻</span>
        <span class="label-en">News</span>
      </a>
      <a href="https://github.com/lightproud/brain-in-a-vat" target="_blank" rel="noopener">
        <span class="label-zh">仓库</span>
        <span class="label-en">Repository</span>
      </a>
    </nav>
  </main>
  <footer>缸中之脑 Brain in a Vat</footer>
</body>
</html>
