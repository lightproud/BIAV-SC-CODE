<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>环行记 · Ring Chronicle — 忘却前夜衍生玩法</title>
<style>
  :root { --ink:#0b1020; --panel:#0f172a; --line:#1e293b; --text:#e2e8f0; --dim:#64748b; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(circle at 50% 30%, #131a33, #060912 70%);
    color: var(--text); font-family: "Noto Serif SC", "Songti SC", serif;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  h1 { font-size: 26px; letter-spacing: .3em; margin: 18px 0 2px; }
  .sub { color: var(--dim); font-size: 12px; letter-spacing: .15em; margin-bottom: 10px; }
  #stage { position: relative; width: 960px; max-width: 100vw; }
  canvas { display: block; width: 100%; background: var(--ink); border: 1px solid var(--line); border-radius: 6px; }
  .hidden { display: none !important; }

  /* HUD */
  #hud { position: absolute; inset: 0; pointer-events: none; padding: 10px; font-family: ui-monospace, monospace; }
  .hudtop { display: flex; gap: 14px; align-items: center; font-size: 14px; text-shadow: 0 1px 3px #000; }
  #timer { font-size: 20px; font-weight: 700; }
  #reso { font-size: 13px; }
  .bar { height: 12px; background: rgba(2,6,23,.7); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; margin-top: 6px; }
  .bar > div { height: 100%; transition: width .12s linear; }
  #hpbar { background: linear-gradient(90deg,#dc2626,#f87171); }
  #xpwrap { height: 7px; }
  #xpbar { background: linear-gradient(90deg,#14b8a6,#5eead4); }
  #hptext { font-size: 11px; color: var(--dim); }
  #weplist { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .wchip { font-size: 11px; color: #fff; padding: 2px 7px; border-radius: 10px; text-shadow: 0 1px 2px rgba(0,0,0,.5); }

  /* overlays */
  .overlay { position: absolute; inset: 0; background: rgba(6,9,18,.82); display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 16px; border-radius: 6px; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 880px; }
  .card { background: var(--panel); border: 2px solid var(--line); border-radius: 10px; padding: 14px;
    width: 200px; cursor: pointer; pointer-events: auto; transition: transform .1s, box-shadow .1s; position: relative; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .badge { position: absolute; top: -10px; left: 12px; font-size: 11px; color: #fff; padding: 1px 8px; border-radius: 8px; }
  .cname, .upname { font-size: 17px; font-weight: 700; margin-top: 6px; }
  .ctitle { font-size: 12px; color: var(--dim); margin-bottom: 6px; }
  .crow, .updesc { font-size: 13px; line-height: 1.5; }
  .cdesc { font-size: 12px; color: #cbd5e1; margin-top: 6px; line-height: 1.4; }
  .clore { font-size: 11px; color: var(--dim); margin-top: 8px; font-style: italic; }
  #charlist { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
  .htitle { font-size: 22px; letter-spacing: .2em; }
  .hint { color: var(--dim); font-size: 12px; }
  button { background: #1e293b; color: var(--text); border: 1px solid #334155; padding: 9px 22px;
    border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; pointer-events: auto; }
  button:hover { background: #334155; }
  #endtitle { font-size: 26px; letter-spacing: .15em; }
  #endstats { color: #cbd5e1; font-family: ui-monospace, monospace; }
  footer { color: var(--dim); font-size: 11px; margin: 14px 0; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <h1>环 行 记</h1>
  <div class="sub">RING CHRONICLE · 忘却前夜衍生玩法 · 银芯公开知识层</div>

  <div id="stage">
    <canvas id="game" width="960" height="600"></canvas>

    <!-- 角色选择 -->
    <div id="select" class="overlay">
      <div class="htitle">选择唤醒体</div>
      <div class="hint">WASD / 方向键移动 · 武器自动攻击 · 升级时三选一 · 存活 10 分钟击败融蚀领主</div>
      <div id="charlist"></div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hudtop">
        <span id="timer">00:00</span>
        <span id="level">Lv 1</span>
        <span id="kills">击杀 0</span>
        <span id="reso">无共鸣</span>
      </div>
      <div class="bar" style="width:280px"><div id="hpbar" style="width:100%"></div></div>
      <span id="hptext">100 / 100</span>
      <div class="bar" id="xpwrap" style="width:280px"><div id="xpbar" style="width:0%"></div></div>
      <div id="weplist"></div>
    </div>

    <!-- 升级 -->
    <div id="levelup" class="overlay hidden">
      <div class="htitle">觉醒 · 命运卡</div>
      <div class="hint">从过去的经历中获得力量</div>
      <div id="cards" class="cards"></div>
    </div>

    <!-- 结算 -->
    <div id="end" class="overlay hidden">
      <div id="endtitle"></div>
      <div id="endstats"></div>
      <button id="again">再次环行</button>
    </div>
  </div>

  <footer>
    忘却前夜（Morimens）衍生同人玩法 · 仅引用公开可查阅信息 · 非官方商业内容<br>
    四界域机制 / 唤醒体设定取自公开资料，玩法数值为本同人平衡设计
  </footer>

  <script src="config/config.js"></script>
  <script src="src/core.js"></script>
  <script src="src/sprites.js"></script>
  <script src="src/render.js"></script>
  <script src="src/input.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
