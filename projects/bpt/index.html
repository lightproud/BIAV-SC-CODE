<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BPT — Black Pool Terminal</title>
    <!-- Flash prevention: apply theme class synchronously before first paint -->
    <script>
      (function () {
        var theme = localStorage.getItem('bpt-theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          // Default to dark mode (brand canonical)
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-bpt-bg text-bpt-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
