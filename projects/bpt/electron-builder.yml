# electron-builder.yml -- BPT packaging configuration.
#
# Why portable (dir) targets: BPT is distributed via internal SVN, not app stores.
# The "dir" target produces an unpacked directory that can be committed to SVN
# or hosted on a file server. Switch to nsis/dmg/AppImage when store distribution
# is needed.
#
# Usage:
#   npm run build:dist          -- build for current platform
#   npm run build:dist:win      -- cross-compile for Windows
#   npm run build:dist:mac      -- cross-compile for macOS
#   npm run build:dist:linux    -- cross-compile for Linux

appId: com.biav.bpt
productName: "BPT"
copyright: "B.I.A.V. Studio"

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: plugins/
    to: plugins/
    filter:
      - "**/*"
  - from: models/
    to: models/
    filter:
      - "**/*"

# ── Windows ──────────────────────────────────────────────────────
win:
  target:
    - target: dir
      arch:
        - x64
  icon: build/icon.svg

# ── macOS ────────────────────────────────────────────────────────
mac:
  target:
    - target: dir
      arch:
        - x64
        - arm64
  icon: build/icon.svg

# ── Linux ────────────────────────────────────────────────────────
linux:
  target:
    - target: dir
      arch:
        - x64
  icon: build/icon.svg

# ── Auto-update (generic provider for internal file server) ──────
publish:
  provider: generic
  url: ""
