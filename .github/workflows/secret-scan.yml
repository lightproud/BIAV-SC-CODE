name: Secret Scan

# 显式凭据扫描（gitleaks）——补强「银芯自有凭据面」的供应链/泄漏防线。
# 落地依据：守密人 2026-07-19 裁定（KIMI3 静态审查 B 段「加 secret 扫描」直接落地）。
# 与既有 redact_secrets（落盘/日志脱敏）互补：那条防「写出去」，本条防「提交进来」。
# 扫描范围经 .gitleaks.toml 聚焦代码/CI/脚本/配置，社区全量档案层 allowlist 排除避免误报。

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 每周一 03:17 UTC（≈ 北京时间 11:17）全量兜底扫一遍历史，抓 PR/push 增量漏网。
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（全历史，gitleaks 需 commit 范围）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # 个人账户 / 公开仓无需 GITLEAKS_LICENSE。
          # 关闭 PR 评论以维持 contents: read 最小权限（发现即 job 失败，已足够作门）。
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: true
