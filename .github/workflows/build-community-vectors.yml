name: Build Community Vectors

# 构建银芯长尾向量索引（§八「厚锚撑向量」参照实现，Phase 2）。
# 嵌入走 Voyage API（需 secret VOYAGE_API_KEY）——CI 是唯一能用该 key 的地方
# （会话/本地取不到）。有界原型优先：默认 --limit 小，先证 key 有效 + 索引建得出。
#
# 触发：workflow_dispatch（手动，带 limit 入参）。需 workflow 在默认分支才可 dispatch，
#   故合并后可用；key 有效性 + 索引建得出已实测跑绿（2026-07-05：1500×512 voyage-3-lite）。
# 产物（chunk2，守密人 2026-07-05 裁定 1）：真索引上传 Release community-assets
#   （gh release upload --clobber，照 collect-fanart.yml 直传范式）——合本仓「二进制→Release、
#   git 留指针」范式；索引确定性 gzip（GzipFile mtime=0）保证同内容不 churn 资产。
#   运行时还原：scripts/restore_release_data.py --tag community-assets
#   --pattern 'kb_vectors.json.gz' --dest okf。actions artifact 保留供 run 内检视。
# 规模（守密人 2026-07-05「完全生成→扩到架构上限」裁定）：默认 60000 = 纯 Python
#   架构实测水位（gz ≈ 92MB 单 Release 资产 / 全表扫描 ≈ 1.9s / array('f') 常驻 ≈ 140MB）。
#   采样分层：非 discord 16 平台全量收编（~3.4 万）+ discord 确定性跨步填满剩余
#   （见 build_kb_vectors.collect docstring）。全量 757 万 = 量产子工程，另行裁定。
on:
  workflow_dispatch:
    inputs:
      limit:
        description: 索引条数上限（分层采样；默认 60000 = 架构上限水位）
        required: false
        default: '60000'

concurrency:
  group: community-vectors-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # gh release upload 需要（仅传 Release 资产，不 push git）

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 两遍流式采样 + 60k 条 Voyage 嵌入（~470 批）需富余
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install embedding dep
        run: pip install --quiet 'voyageai>=0.3.0'
      - name: Guard — VOYAGE_API_KEY 必须已配置
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          if [ -z "$VOYAGE_API_KEY" ]; then
            echo "::error::secret VOYAGE_API_KEY 未配置——退役向量栈的旧 key 可能已被删。"
            echo "::error::请在 仓库 Settings → Secrets and variables → Actions 添加 VOYAGE_API_KEY。"
            exit 1
          fi
          echo "VOYAGE_API_KEY 已注入（长度 ${#VOYAGE_API_KEY}）——key 存在，继续构建。"
      - name: Build bounded community vector index (Voyage)
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          # --out 必须显式传：#449 后默认落 gitignored Public-Info-Pool/Rough/（防本地
          # 桩索引污染 okf/），CI 建生产索引须落回 okf/ 供上传。
          python scripts/build_kb_vectors.py \
            --backend voyage \
            --limit "${{ github.event.inputs.limit || '60000' }}" \
            --out okf/kb_vectors.json.gz
      - name: Upload index to Release community-assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload community-assets okf/kb_vectors.json.gz --clobber \
            --repo "${{ github.repository }}"
          echo "已上传 kb_vectors.json.gz → Release community-assets（--clobber 覆盖旧版）"
      - name: Upload index artifact (run 内检视用)
        uses: actions/upload-artifact@v7
        with:
          name: kb-vectors-bounded
          path: okf/kb_vectors.json.gz
          if-no-files-found: error
          retention-days: 14
