name: Store Patrol

# Campaign 2 (SCS-REQ orchestrator-sdk §8 "new-scenario first-flight"): the
# daily Morimens storefront patrol — the first REAL recurring task running on
# the Silver Core Maestro SDK's task ledger + driver in production. The host
# app is examples/store-patrol.mjs (public surfaces only); targets live in
# examples/store-patrol.targets.json (registry: new storefront = new entry,
# zero new code). Snapshots + change log land in
# Public-Info-Pool/Record/store-patrol/ and are committed with [skip ci].
#
# Daily slot: Beijing 15:15 (07:15 UTC) — the unified 北京 15 点档 for daily
# collectors (keeper ruling 2026-07-11), minute-offset against the 07:00 /
# 07:05 / 07:10 / 07:37 siblings.

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

concurrency:
  group: store-patrol
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          # Sparse: exclude the multi-GB archive layers but RE-INCLUDE the
          # patrol's own archive subdir (write + commit target). Re-inclusion
          # verified with `git sparse-checkout check-rules` (2026-07-18).
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            /Public-Info-Pool/Record/store-patrol/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies (workspace root)
        run: npm ci
      - name: Build maestro SDK (patrol host dependency)
        run: npm run build --workspace silver-core-maestro-sdk
      # A partial patrol failure (one storefront down) must not discard the
      # SUCCESSFUL targets' snapshots + ledger state (audit H5): capture the
      # exit code, always commit, and only then fail the job.
      - name: Run store patrol (ledger + driver)
        id: patrol
        continue-on-error: true
        run: RUN_STORE_PATROL=1 node projects/silver-core-maestro-sdk/examples/store-patrol.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Public-Info-Pool/Record/store-patrol/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: store patrol snapshot [skip ci]"
            for i in 1 2 3 4; do
              if git pull --rebase origin main; then
                git push origin main && exit 0
              else
                git checkout --theirs . 2>/dev/null || true
                git add -A
                git -c core.editor=true rebase --continue \
                  && git push origin main && exit 0
                git rebase --abort 2>/dev/null || true
              fi
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
      # Deferred failure: the commit step above has already persisted whatever
      # the patrol did manage to collect; now surface the partial failure.
      - name: Fail the job if the patrol failed
        if: steps.patrol.outcome == 'failure'
        run: |
          echo "Store patrol exited non-zero (partial failure); snapshots for successful targets were committed above."
          exit 1
