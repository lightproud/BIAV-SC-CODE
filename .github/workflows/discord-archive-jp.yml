name: Discord Archive (JP)

# 日服服务器采集，与 Global 完全隔离（数据落 discord/jp/，2026-07-10 方案甲区服布局），复用同一 bot。
# T62 P2-3c 已切换（2026-07-19）：写 **BIAV-SC-DATA**（不再写 code 仓）。archiver 经 env
# BIAV_SC_DATA_ROOT 解析数据根 = data 仓 checkout；提交推 data 仓（PAT）。
#
# guild = 1377475512716234902 ·【公式】忘却前夜サーバー（日服官方），2026-06-17 探测确认并启用。
# Guard 步骤保留：若 JP_GUILD_ID 被清空则安全跳过、不回落 Global guild。
on:
  schedule:
    - cron: '45 */3 * * *'
  workflow_dispatch:

concurrency:
  group: discord-archive-jp-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read   # 只读 code 仓脚本；写 data 仓走 PAT

env:
  JP_GUILD_ID: '1377475512716234902'
  BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo

jobs:
  archive:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Guard — require JP guild id
        id: guard
        run: |
          if [ -z "$JP_GUILD_ID" ]; then
            echo "::notice::JP_GUILD_ID 未配置 —— 安全跳过。请先运行 'Discord Discover Guilds'，从 discord/guilds_seen.json 取得日服 guild ID 填入 env.JP_GUILD_ID。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code repo（sparse 脚本，不取数据）
        uses: actions/checkout@v7
        if: steps.guard.outputs.skip == 'false'
        with:
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r projects/news/requirements.txt

      - name: Clone BIAV-SC-DATA（PAT，数据根）
        if: steps.guard.outputs.skip == 'false'
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Run Discord archiver for JP guild
        if: steps.guard.outputs.skip == 'false'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ env.JP_GUILD_ID }}
        run: python projects/news/scripts/discord_archiver.py

      - name: Commit and push if changed → BIAV-SC-DATA
        if: steps.guard.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cd data-repo
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/discord/jp/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: archive JP Discord data (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
