name: Discord Archive (JP)

# 日服服务器采集，与 Global 完全隔离（数据落 guilds/1377475512716234902/），复用同一 bot。
#
# guild = 1377475512716234902 ·【公式】忘却前夜サーバー（日服官方），2026-06-17 探测确认并启用。
# 每小时 :45 增量 + 多月历史回填；首跑全量回溯建服至今。Guard 步骤保留：若 JP_GUILD_ID
# 被清空则安全跳过、不回落 Global guild。
on:
  schedule:
    # 每小时一次，offset :45 错开 Global（每日 18:00）与志愿者（:15）
    - cron: '45 * * * *'
  workflow_dispatch:

concurrency:
  group: discord-archive-jp-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # 日服 guild ID（【公式】忘却前夜サーバー）。留空时本 workflow 经 Guard 安全跳过。
  JP_GUILD_ID: '1377475512716234902'

jobs:
  archive:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Guard — require JP guild id
        id: guard
        run: |
          if [ -z "$JP_GUILD_ID" ]; then
            echo "::notice::JP_GUILD_ID 未配置 —— 安全跳过。请先运行 'Discord Discover Guilds'，从 projects/news/data/discord/guilds_seen.json 取得日服 guild ID 填入 env.JP_GUILD_ID。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.guard.outputs.skip == 'false'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r projects/news/requirements.txt

      - name: Run Discord archiver for JP guild
        if: steps.guard.outputs.skip == 'false'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ env.JP_GUILD_ID }}
        # 默认 run()：增量 + 多月历史回填。首跑会全量回溯日服建服至今的历史。
        # 数据根由 archiver 自动分层到 guilds/{guild_id}/（非 Global guild）。
        run: python projects/news/scripts/discord_archiver.py

      - name: Commit and push if changed
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Public-Info-Pool/Record/Community/discord/guilds/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: archive JP Discord data [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
