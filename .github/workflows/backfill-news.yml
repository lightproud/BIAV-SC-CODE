name: Backfill Historical News

on:
  schedule:
    # Run every hour
    - cron: '20 * * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to backfill (leave empty for all)'
        required: false
        type: string
      pages:
        description: 'Pages to fetch per platform (default 5)'
        required: false
        default: '5'
        type: string

concurrency:
  group: backfill-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Matrix strategy: each platform runs as a separate parallel job
  backfill:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      # 必须与 scripts/sources.py BACKFILL_PLATFORMS（= backfill_platforms.py
      # PLATFORM_BACKFILLERS）保持一致。dcinside 无对应回填器，已移除以免空转。
      matrix:
        platform:
          - bilibili
          - appstore
          - steam_review
          - arca_live
          - pixiv
          - ruliweb
          - weixin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check if this platform should run
        id: check
        env:
          INPUT_PLATFORM: ${{ github.event.inputs.platform }}
        run: |
          REQUESTED="$INPUT_PLATFORM"
          CURRENT="${{ matrix.platform }}"
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r projects/news/requirements.txt

      - name: Install Playwright browsers
        if: steps.check.outputs.skip != 'true'
        run: playwright install chromium || true

      - name: Pull latest backfill state
        if: steps.check.outputs.skip != 'true'
        run: |
          git pull --rebase origin main || true

      - name: "Run backfill: ${{ matrix.platform }}"
        if: steps.check.outputs.skip != 'true'
        env:
          INPUT_PAGES: ${{ github.event.inputs.pages || '5' }}
        run: |
          PAGES="$INPUT_PAGES"
          python projects/news/scripts/backfill_platforms.py --platform ${{ matrix.platform }} --pages $PAGES

      - name: Commit and push if changed
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: backfill ${{ matrix.platform }} historical data [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
