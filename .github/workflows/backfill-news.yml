name: Backfill Historical News

# T62 P2-3c 已切换（2026-07-19）：**双目标**——Record/Community 归档写 **BIAV-SC-DATA**
# （backfill_platforms 经 community_root() 分仓桥接），news/data 状态仍写 **code 仓**。
# code 仓 checkout 保 ssh-key（推 state 回 code 仓）+ clone data 仓（PAT，推归档）。
on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to backfill (leave empty for all)'
        required: false
        type: string
      pages:
        description: 'Pages to fetch per platform (default 5)'
        required: false
        default: '5'
        type: string

concurrency:
  group: backfill-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    working-directory: code-repo

jobs:
  backfill:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - bilibili
          - appstore
          - steam_review
          - arca_live
          - pixiv
          - ruliweb
          - weixin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo
    steps:
      - name: Check if this platform should run
        id: check
        working-directory: ${{ github.workspace }}
        env:
          INPUT_PLATFORM: ${{ github.event.inputs.platform }}
        run: |
          REQUESTED="$INPUT_PLATFORM"
          CURRENT="${{ matrix.platform }}"
          if [ -n "$REQUESTED" ] && [ "$REQUESTED" != "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code repo（sparse 脚本 + state，ssh-key 供回推）
        uses: actions/checkout@v7
        if: steps.check.outputs.skip != 'true'
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
          path: code-repo
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Clone BIAV-SC-DATA（PAT，Record 数据根）
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ github.workspace }}
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r projects/news/requirements.txt

      - name: Install Playwright browsers
        if: steps.check.outputs.skip != 'true'
        run: playwright install chromium || true

      - name: Pull latest backfill state (code repo)
        if: steps.check.outputs.skip != 'true'
        run: git pull --rebase origin main || true

      - name: "Run backfill: ${{ matrix.platform }}"
        if: steps.check.outputs.skip != 'true'
        env:
          INPUT_PAGES: ${{ github.event.inputs.pages || '5' }}
        run: |
          PAGES="$INPUT_PAGES"
          python projects/news/scripts/backfill_platforms.py --platform ${{ matrix.platform }} --pages $PAGES

      - name: Commit state → code repo
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: backfill ${{ matrix.platform }} state [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
              [ "$i" = "4" ] && { echo "All push attempts failed"; exit 1; }
            done
          fi

      - name: Commit archive → BIAV-SC-DATA
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ github.workspace }}/data-repo
        run: |
          set -euo pipefail
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "data: backfill ${{ matrix.platform }} historical data (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "All push attempts failed"
          exit 1
