name: "🎨 Collect Fan Art"

# 独立采集忘却前夜社区当日（默认北京昨日）二创同人图，归档到
# projects/news/data/fanart/{date}/，供会话内报告引用。经 Discord attachments/refresh-urls
# 刷新过期 CDN 链接后落盘原图（缩略图在会话产报告时按需生成）。
# 只用 DISCORD_BOT_TOKEN（免费），不碰 Anthropic API、不花钱。

on:
  workflow_dispatch:
    inputs:
      date:
        description: '归档日期标签 YYYY-MM-DD（默认=北京昨日）'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * *'   # 每日 02:00 UTC 自动采（与新闻管线同属免费数据层）

concurrency:
  group: collect-fanart
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect fan art
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          D="${{ github.event.inputs.date }}"
          [ -n "$D" ] || D=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y-%m-%d)
          python projects/news/scripts/collect_fanart.py --date "$D" --out "projects/news/data/fanart/$D"

      - name: Commit fan art archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/fanart/
          if git diff --staged --quiet; then
            echo "No new fan art to commit"
          else
            git commit -m "chore: archive community fan art [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              sleep $i
            done
            exit 1
          fi
