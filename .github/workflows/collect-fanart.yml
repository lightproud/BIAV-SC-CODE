name: "🎨 Collect Fan Art"

# 独立采集忘却前夜社区当日（默认北京昨日）二创同人图，落 runner 本地 staging
# projects/news/data/fanart/{date}/ 后直传 community-assets release 当月资产
# （fanart-archive-{YYYY-MM}.tar.gz，取回既有月桶合并后经归档引擎 --force-group 重传）。
# 2026-06-21 守密人裁定 fanart 二进制不入 git（.gitignore 排除、采集链直传 release），
# 故本工作流不做任何 git 提交。经 Discord attachments/refresh-urls 刷新过期 CDN 链接
# 后落盘原图（缩略图在会话产报告时按需生成）。
# 只用 DISCORD_BOT_TOKEN（免费），不碰 Anthropic API、不花钱。

on:
  workflow_dispatch:
    inputs:
      date:
        description: '归档日期标签 YYYY-MM-DD（默认=北京昨日）'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * *'   # 每日 02:00 UTC 自动采（与新闻管线同属免费数据层）

concurrency:
  group: collect-fanart
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect fan art
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          D="${{ github.event.inputs.date }}"
          [ -n "$D" ] || D=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y-%m-%d)
          python projects/news/scripts/collect_fanart.py --date "$D" --out "projects/news/data/fanart/$D"
          echo "FANART_DATE=$D" >> "$GITHUB_ENV"

      - name: Upload to community-assets release (merge month asset)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=projects/news/data/fanart
          if [ ! -d "$BASE/$FANART_DATE" ] || [ -z "$(ls -A "$BASE/$FANART_DATE")" ]; then
            echo "No new fan art for $FANART_DATE, nothing to upload"
            exit 0
          fi
          M=${FANART_DATE:0:7}
          ASSET="fanart-archive-$M.tar.gz"
          mkdir -p /tmp/fanart-assets
          # 查询失败必须硬失败：静默当「资产不存在」会用当日增量 --clobber 覆掉整月存量
          gh release view community-assets --json assets -q '.assets[].name' \
            --repo "$GITHUB_REPOSITORY" > /tmp/fanart-assets/names.txt
          if grep -qx "$ASSET" /tmp/fanart-assets/names.txt; then
            gh release download community-assets --pattern "$ASSET" \
              --dir /tmp/fanart-assets --repo "$GITHUB_REPOSITORY"
            # --skip-old-files：月桶存量与本次新采同名时保留新采（刚刷新过 CDN 链接）
            tar --skip-old-files -xzf "/tmp/fanart-assets/$ASSET" -C "$BASE"
          else
            echo "No existing asset for $M (first upload of the month)"
          fi
          python projects/news/scripts/archive_engine.py --source fanart --force-group "$M"
