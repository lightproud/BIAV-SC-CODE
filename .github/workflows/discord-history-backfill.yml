name: Discord History Backfill

# T62 P2-3c 已切换（2026-07-19）：写 **BIAV-SC-DATA**（不再写 code 仓）。
# archiver --history-only 经 env BIAV_SC_DATA_ROOT 解析数据根 = data 仓 checkout。
on:
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

concurrency:
  group: discord-history-backfill-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read   # 只读 code 仓脚本；写 data 仓走 PAT

env:
  BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo

jobs:
  backfill:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout code repo（sparse 脚本，不取数据）
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Clone BIAV-SC-DATA（PAT，数据根）
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Run history-only backfill
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python projects/news/scripts/discord_archiver.py --history-only

      - name: Commit and push if changed → BIAV-SC-DATA
        run: |
          set -euo pipefail
          cd data-repo
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/discord/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: discord history backfill (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
