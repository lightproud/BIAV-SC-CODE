name: Backfill Data Gap

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '缺口起始日 YYYY-MM-DD（留空 = 默认 2026-04-13）'
        required: false
        default: ''
      end_date:
        description: '缺口结束日 YYYY-MM-DD（留空 = 默认 2026-04-25）'
        required: false
        default: ''

concurrency:
  group: backfill-gap-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Run gap backfill (Reddit, YouTube, Bilibili, Weibo, Steam)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          GAP_START_DATE: ${{ github.event.inputs.start_date }}
          GAP_END_DATE: ${{ github.event.inputs.end_date }}
        run: python projects/news/scripts/backfill_gap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # backfill_gap.py writes archives to Public-Info-Pool (4R layout, 2026-07-12 fix);
          # projects/news/data/ still holds state files (gap_report etc.)
          git add -A Public-Info-Pool/Record/Community/ projects/news/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(news): backfill data gap [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
