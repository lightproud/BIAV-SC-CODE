name: Backfill Data Gap

# T62 P2-3c 已切换（2026-07-19）：**双目标**——Record/Community 归档写 **BIAV-SC-DATA**
# （backfill_gap 经 community_root() 分仓桥接），news/data 状态仍写 **code 仓**。
# code 仓 checkout 保 ssh-key（推 state 回 code 仓）+ clone data 仓（PAT，推归档）。
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '缺口起始日 YYYY-MM-DD（留空 = 默认 2026-04-13）'
        required: false
        default: ''
      end_date:
        description: '缺口结束日 YYYY-MM-DD（留空 = 默认 2026-04-25）'
        required: false
        default: ''

concurrency:
  group: backfill-gap-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    working-directory: code-repo

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo
    steps:
      - name: Checkout code repo（sparse 脚本 + state，ssh-key 供回推）
        uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
          path: code-repo
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone BIAV-SC-DATA（PAT，Record 数据根）
        working-directory: ${{ github.workspace }}
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Run gap backfill (Reddit, YouTube, Bilibili, Weibo, Steam)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          GAP_START_DATE: ${{ github.event.inputs.start_date }}
          GAP_END_DATE: ${{ github.event.inputs.end_date }}
        run: python projects/news/scripts/backfill_gap.py

      - name: Commit state → code repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore(news): backfill data gap state [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
              [ "$i" = "4" ] && { echo "All push attempts failed"; exit 1; }
            done
          fi

      - name: Commit archive → BIAV-SC-DATA
        working-directory: ${{ github.workspace }}/data-repo
        run: |
          set -euo pipefail
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "data(news): backfill data gap (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
