name: Update Community News

# T62 P2-3c 已切换（2026-07-19）：**双目标**——Record/Community 归档写 **BIAV-SC-DATA**
# （archive_platforms / repair_gaps 经 community_root() 分仓桥接），output 快照 + news/data
# 状态仍写 **code 仓**（分仓设计：仅 Record 数据湖迁 data 仓）。故 code 仓 checkout 保
# ssh-key（推 output/state 回 code 仓、绕分支保护）+ clone data 仓（PAT，推 Record/Community）。
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

defaults:
  run:
    working-directory: code-repo

jobs:
  update:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo
    steps:
      - name: Checkout code repo（sparse 脚本 + output/state，ssh-key 供回推）
        uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }}
          path: code-repo
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone BIAV-SC-DATA（PAT，Record 数据根）
        working-directory: ${{ github.workspace }}
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run aggregator (unified collection)
        id: aggregator
        continue-on-error: true
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_IDS: ${{ secrets.FACEBOOK_PAGE_IDS }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_ACCESS_TOKEN: ${{ secrets.TWITCH_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          TWITTER_HANDLES: ${{ secrets.TWITTER_HANDLES }}
          DC_GALLERY_ID: ${{ secrets.DC_GALLERY_ID }}
          QQ_CHANNEL: ${{ secrets.QQ_CHANNEL }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          NAVER_COOKIE: ${{ secrets.NAVER_COOKIE }}
        run: python projects/news/scripts/aggregator.py

      - name: Split output by platform
        run: python projects/news/scripts/split_output.py

      - name: Download media (images, covers, fan art)
        run: python projects/news/scripts/download_media.py --max-downloads 100

      - name: Archive platform data by date
        run: python projects/news/scripts/archive_platforms.py

      - name: Repair archive date gaps
        run: python projects/news/scripts/repair_gaps.py

      - name: Refresh silent-source health report
        run: python projects/news/scripts/silent_sources_audit.py --write

      - name: Core-source health gate (non-blocking alarm)
        id: health_gate
        continue-on-error: true
        run: python projects/news/scripts/silent_sources_audit.py --strict

      - name: Commit output + state → code repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/output/ projects/news/data/
          if git diff --staged --quiet; then
            echo "No output/state changes to commit"
          else
            git commit -m "chore: update community news output [skip ci]"
            for i in 1 2 3 4; do
              if git pull --rebase origin main; then
                git push origin main && break
              else
                git checkout --theirs . 2>/dev/null || true
                git add -A
                git -c core.editor=true rebase --continue \
                  && git push origin main && break
                git rebase --abort 2>/dev/null || true
              fi
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
              [ "$i" = "4" ] && { echo "All push attempts failed"; exit 1; }
            done
          fi

      - name: Commit archive → BIAV-SC-DATA
        working-directory: ${{ github.workspace }}/data-repo
        run: |
          set -euo pipefail
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "data: archive community platform data (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1

      - name: Surface aggregator failure (sentinel check)
        run: |
          if [ -f projects/news/aggregator-failure.flag ]; then
            echo "Aggregator reported failure:"
            cat projects/news/aggregator-failure.flag
            exit 1
          fi

      - name: Open health alert issue (deduplicated)
        if: steps.health_gate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="[健康门控] 采集健康告警（核心源沉默 或 校验丢弃超阈值）"
          EXISTING=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create --title "$TITLE" \
              --body "silent_sources_audit --strict 触发告警（核心源零产出/长期沉默，或单源单轮校验丢弃 >= 50 条——后者意味着采集在产出但被校验层扔掉，查 VALID_SOURCES/必填字段契约是否漂移）。具体原因见运行日志 [健康门控] 行。运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}。详见 projects/news/output/source-health.json 与 validation-drops.json。"
          else
            echo "Alert issue already open, skipping"
          fi

      - name: Surface collector failures
        if: steps.aggregator.outcome == 'failure'
        run: |
          echo "aggregator(unified)=${{ steps.aggregator.outcome }}"
          exit 1
