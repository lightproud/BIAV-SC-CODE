name: Update Community News

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      # aggregator / collect_global 失败（核心源异常的非零退出）不再中断管线：
      # 下游 split/archive/commit 始终执行，避免单源反爬把当小时全平台归档拖死。
      # 失败语义由末尾 "Surface collector failures" 步骤兜底（§4.2 R1 可见性保留）。
      # ARCH-01 统一入口（goal 2026-06-20「合并所有采集器功能到 AC」）：aggregator.py 现为
      # 唯一采集入口——先采 AC 平台（reddit/bilibili/taptap/steam/discord 本地），再内部调
      # collect_global.main() 采全球平台并产出最终 news.json + news-raw.json。原独立的
      # "Run global collectors" 步已并入此处，env 取两步并集，避免重复采集。
      - name: Run aggregator (unified collection)
        id: aggregator
        continue-on-error: true
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_IDS: ${{ secrets.FACEBOOK_PAGE_IDS }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_ACCESS_TOKEN: ${{ secrets.TWITCH_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          TWITTER_HANDLES: ${{ secrets.TWITTER_HANDLES }}
          DC_GALLERY_ID: ${{ secrets.DC_GALLERY_ID }}
          QQ_CHANNEL: ${{ secrets.QQ_CHANNEL }}
          # Cookie-based auth (set in GitHub Secrets to enable)
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          NAVER_COOKIE: ${{ secrets.NAVER_COOKIE }}
        run: python projects/news/scripts/aggregator.py

      - name: Split output by platform
        run: python projects/news/scripts/split_output.py

      - name: Download media (images, covers, fan art)
        run: python projects/news/scripts/download_media.py --max-downloads 100

      - name: Archive platform data by date
        run: python projects/news/scripts/archive_platforms.py

      - name: Repair archive date gaps
        run: python projects/news/scripts/repair_gaps.py

      - name: Refresh silent-source health report
        run: python projects/news/scripts/silent_sources_audit.py --write

      - name: Core-source health gate (non-blocking alarm)
        # 核心源（nga/taptap/bilibili 等）零产出 / 长期沉默时此步标红，
        # 但 continue-on-error 不阻断归档提交，仅作可见告警（采集故障可见化）。
        id: health_gate
        continue-on-error: true
        run: python projects/news/scripts/silent_sources_audit.py --strict

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/output/ projects/news/data/ Public-Info-Pool/Record/Community/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update community news [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi

      - name: Surface aggregator failure (sentinel check)
        # H9: aggregator 失败时写哨兵并以 0 退出，保证后续采集/归档/提交照常执行；
        # 数据已提交后在此检测哨兵，存在则标红整个 run（失败仍在 CI 可见）。
        run: |
          if [ -f projects/news/aggregator-failure.flag ]; then
            echo "Aggregator reported failure:"
            cat projects/news/aggregator-failure.flag
            exit 1
          fi
      - name: Open health alert issue (deduplicated)
        # 健康门控标红时开 issue 报警，已有打开的同名 issue 则不重复开。
        # 解决「报警器只记本子不响铃」：沉默源不再静默。
        # 2026-07-02 起 --strict 有两类判据（核心源沉默 / 校验丢弃超阈值），
        # 标题与正文覆盖两者，具体原因看运行日志的 [健康门控] 行。
        if: steps.health_gate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[健康门控] 采集健康告警（核心源沉默 或 校验丢弃超阈值）"
          EXISTING=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create --title "$TITLE" \
              --body "silent_sources_audit --strict 触发告警（核心源零产出/长期沉默，或单源单轮校验丢弃 >= 50 条——后者意味着采集在产出但被校验层扔掉，查 VALID_SOURCES/必填字段契约是否漂移）。具体原因见运行日志 [健康门控] 行。运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}。详见 projects/news/output/source-health.json 与 validation-drops.json。"
          else
            echo "Alert issue already open, skipping"
          fi

      - name: Surface collector failures
        # §4.2 R1：核心源失败仍以红色运行可见，但归档与提交已在上方完成。
        if: steps.aggregator.outcome == 'failure'
        run: |
          echo "aggregator(unified)=${{ steps.aggregator.outcome }}"
          exit 1
