name: Update Community News

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run aggregator
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python projects/news/scripts/aggregator.py

      - name: Run global collectors (29 platforms)
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_IDS: ${{ secrets.FACEBOOK_PAGE_IDS }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_ACCESS_TOKEN: ${{ secrets.TWITCH_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          DC_GALLERY_ID: ${{ secrets.DC_GALLERY_ID }}
          QQ_CHANNEL: ${{ secrets.QQ_CHANNEL }}
          # Cookie-based auth (set in GitHub Secrets to enable)
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          NAVER_COOKIE: ${{ secrets.NAVER_COOKIE }}
        run: python projects/news/scripts/collect_global.py

      - name: Split output by platform
        run: python projects/news/scripts/split_output.py

      - name: Download media (images, covers, fan art)
        run: python projects/news/scripts/download_media.py --max-downloads 100

      - name: Archive platform data by date
        run: python projects/news/scripts/archive_platforms.py

      - name: Repair archive date gaps
        run: python projects/news/scripts/repair_gaps.py

      - name: Refresh silent-source health report
        run: python projects/news/scripts/silent_sources_audit.py --write

      - name: Core-source health gate (non-blocking alarm)
        # 核心源（nga/taptap/bilibili 等）零产出 / 长期沉默时此步标红，
        # 但 continue-on-error 不阻断归档提交，仅作可见告警（采集故障可见化）。
        continue-on-error: true
        run: python projects/news/scripts/silent_sources_audit.py --strict

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/output/ projects/news/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update community news [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi

      - name: Surface aggregator failure (sentinel check)
        # H9: aggregator 失败时写哨兵并以 0 退出，保证后续采集/归档/提交照常执行；
        # 数据已提交后在此检测哨兵，存在则标红整个 run（失败仍在 CI 可见）。
        run: |
          if [ -f projects/news/aggregator-failure.flag ]; then
            echo "Aggregator reported failure:"
            cat projects/news/aggregator-failure.flag
            exit 1
          fi
