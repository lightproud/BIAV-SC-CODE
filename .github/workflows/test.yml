name: Run Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'projects/news/scripts/**'
      - 'tests/**'
      - 'CLAUDE.md'
      - 'memory/decisions.md'
      - 'memory/decisions-archive.md'
      - '.github/workflows/test.yml'
  pull_request:
    # NO paths filter on purpose. History: `test` was a required status check
    # (ruleset) until 2026-06-21, when the keeper removed it because full
    # checkout of the 2.6G worktree was slow and a paths-filtered required
    # check deadlocks docs-only PRs on "Expected — waiting for status".
    # 2026-07-02: checkout is now SPARSE (~100MB, see the checkout step), the
    # suite itself is ~5s, and no paths filter means the check always reports —
    # both historical objections are gone. Re-enabling `test` as a required
    # check (plus "require branches up to date", which is what actually
    # prevents PR-A/PR-B independently-green collisions like #373/#374) is a
    # repo-settings change awaiting keeper ruling — see
    # Public-Info-Pool/Resource/proposal/silver-core-maintenance-cadence-20260702.md.
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          # SPARSE checkout（2026-07-02 P0-2）：排除 2.4G 重量档案层（社区全量
          # 归档 + 解包 text），工作树 2.6G -> ~100MB。单测均为 tmp 目录封闭；
          # 少数「真实档案存在性」断言（OKF 指针 / CLAUDE.md 路径三卫）在档案层
          # 缺席时自动 skip（全量环境仍全程执法），已在 sparse 工作树实证
          # 2020 passed / 22 skipped / 0 failed。
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          # jsonschema is pulled in explicitly (not via the heavyweight wiki
          # requirements, which also drag UnityPy/Pillow) so the REAL schema-
          # validation integration tests (tests/test_integration_jsonschema.py)
          # actually run in CI instead of importorskip-ing past the branch.
          # markdown likewise: report_render's build_html tests need it, and the
          # scripts/requirements.txt install below is best-effort (`|| true`) —
          # if weasyprint's native build fails there, markdown would silently
          # vanish with it and the build_html branch would importorskip to fake
          # green. weasyprint itself stays out per the render-deps-on-demand
          # stance; only render()'s thin PDF shell is skipped without it.
          pip install pytest pytest-cov jsonschema markdown
          [ -f projects/news/requirements.txt ] && pip install -r projects/news/requirements.txt || true
          [ -f scripts/requirements.txt ] && pip install -r scripts/requirements.txt || true
      - name: Run tests
        # Coverage gate history: 10 -> 35 -> 90 -> 85. A dynamic-orchestration
        # test sweep on 2026-06-21 lifted TOTAL coverage 43% -> ~94% (CI scope).
        # The gate was then deliberately RELAXED 90 -> 85: network-bound news
        # collectors are inherently hard to unit-test, and a 90 floor would
        # pressure future collector additions into over-mocked filler tests that
        # game the metric instead of verifying behaviour. 85 locks in the sweep's
        # gains while leaving the collector layer room to breathe; 90+ stays the
        # aspirational target, not a hard CI floor. Test-quality (not just line
        # reach) is independently guarded by mutation testing — see
        # .github/workflows/mutation-test.yml and docs/testing-strategy.md.
        # report_render.py is split (P4, 2026-07-02) into pure HTML assembly
        # (tested with the light markdown dep, installed above) and a thin
        # weasyprint PDF shell (kept out of CI per the render-deps-on-demand
        # stance), so it now caps ~87% here instead of ~56%.
        # Branch coverage is ON via .coveragerc `branch = True` (P6): statement
        # coverage alone hid executed-but-never-forked error/degradation
        # branches — the dial got honest, not tighter. Measurement scope is
        # pinned in .coveragerc.
        # Gate 85 -> 92 (2026-07-11, keeper-approved coverage proposal): the
        # P0/P1 gap-fill sweep (arca daily bridge, MCP error branches, alias
        # extractor, KB evaluator CLIs, prompt-refresh sync) lifted TOTAL to
        # ~96% locally, and a floor 11pp under actual would let 5+pp regress
        # silently. 92 keeps ~2-4pp breathing room for cross-env variance and
        # the network-bound collector layer; the 2026-06-21 anti-over-mocking
        # stance stands — the floor chases actual coverage, never leads it.
        run: pytest tests/ -v --cov=scripts --cov=projects/news/scripts --cov=projects/wiki/scripts --cov-report=term --cov-fail-under=92
