name: Run Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'projects/news/scripts/**'
      - 'tests/**'
      - 'CLAUDE.md'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'projects/news/scripts/**'
      - 'tests/**'
      - 'CLAUDE.md'
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          [ -f projects/news/requirements.txt ] && pip install -r projects/news/requirements.txt || true
          [ -f scripts/requirements.txt ] && pip install -r scripts/requirements.txt || true
      - name: Run tests
        run: pytest tests/ -v --cov=scripts --cov=projects/news/scripts --cov=projects/wiki/scripts --cov-report=term --cov-fail-under=10
