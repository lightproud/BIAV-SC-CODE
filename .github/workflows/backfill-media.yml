name: "🖼️ Backfill & Archive Media"

# 媒体补录与归档：把归档里仍存活的图片全部下载，二进制传 GitHub Releases（决策 038/059）。
# Discord 过期链接经 refresh-urls 接口刷新后再下载（附件本体仍在 Discord，丢的只是签名链接）。
# 每日跑兼顾两件事：补回历史存活图 + 趁新鲜留存当日新图（避免再次只存链接）。
#
# 所需 Secrets：DISCORD_BOT_TOKEN（刷新 Discord 链接）；GH_TOKEN 用内置 github.token。

on:
  schedule:
    - cron: '40 * * * *'   # 每小时（清积压期；积压补齐后可调回每日）
  workflow_dispatch:
    inputs:
      no_discord:
        description: '只补持久平台源（跳过 Discord）'
        type: boolean
        default: false
      budget:
        description: '运行预算秒数'
        default: '2400'

concurrency:
  group: backfill-media
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backfill still-alive media (refresh Discord URLs)
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          INPUT_BUDGET: ${{ github.event.inputs.budget || '3000' }}
          INPUT_NO_DISCORD: ${{ github.event.inputs.no_discord }}
        run: |
          FLAGS="--budget $INPUT_BUDGET"
          if [ "$INPUT_NO_DISCORD" = "true" ]; then FLAGS="$FLAGS --no-discord"; fi
          python projects/news/scripts/backfill_media.py $FLAGS

      - name: Package binaries to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: python projects/news/scripts/backfill_media.py --upload

      - name: Commit manifest (text only; binaries live in Releases)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/news/data/media/backfill_manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes"
          else
            git commit -m "chore: backfill media manifest [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              sleep $i
            done
            exit 1
          fi
