name: SDK Mutation Ratchet (weekly)

# Test-QUALITY ratchet for silver-core-sdk (keeper order 2026-07-13): the
# 2026-07-13 quality campaign pushed per-module mutation scores up
# (permissions 92.87%, transport/openai 85.55%); this workflow re-measures
# each ratcheted target weekly and REDS when a score falls below its
# committed floor (mutation-ratchet.json) - i.e. new code brought mutants
# the suite does not kill. Floors only rise (bump after a measured
# improvement); lowering one requires a keeper ruling. Complements the
# python-side mutation-test.yml (mutmut, scripts/) and the SDK unit suite:
# line coverage proves a line ran, the ratchet proves the assertions BITE.
#
# Deliberately scheduled + manual, NOT a per-PR required check: a full
# per-target Stryker round costs ~7-12 minutes.
#
# Matrix names must match mutation-ratchet.json target names - the guard
# script REDS loudly on drift (unknown name), so adding a target means
# editing both files in one PR.

on:
  schedule:
    - cron: '43 5 * * 1' # Mondays 05:43 UTC (13:43 北京)
  workflow_dispatch:
    inputs:
      target:
        description: 'Single ratchet target name to run (empty = full matrix)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [permissions, transport-openai, transport-anthropic, sessions]
    # Single-target dispatch: matrix legs cannot be pruned (matrix context is
    # unavailable in job-level if), so every REAL step carries the same gate —
    # an echo+exit-0 "skip step" gates nothing (audit H4). Empty/absent input
    # (schedule runs) means the full matrix.
    steps:
      - uses: actions/checkout@v7
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        with:
          # SPARSE: the SDK suite does not need the 2.4G archive layers
          # (same exclusions as silver-core-sdk.yml; corpus-sync tests skip
          # gracefully without the Reference snapshot).
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v4
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        with:
          node-version: '20'
      - name: Install dependencies
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        working-directory: projects/silver-core-sdk
        run: npm ci
      - name: Resolve mutate pattern from the baseline
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        id: pattern
        working-directory: projects/silver-core-sdk
        run: |
          PATTERN=$(node -e "
            const b = require('./mutation-ratchet.json');
            const t = (b.targets ?? []).find((t) => t.name === '${{ matrix.target }}');
            if (!t) { console.error('unknown target ${{ matrix.target }} in mutation-ratchet.json'); process.exit(2); }
            console.log(t.mutate);
          ")
          # Per-target ignoreStatic: some targets (e.g. sessions) carry heavy
          # module-load static mutants that inject load-variance noise into the
          # score. Their baseline is measured WITH --ignoreStatic, so the weekly
          # round must match. Emitted as the flag string (empty when unset).
          IGNORE_STATIC=$(node -e "
            const b = require('./mutation-ratchet.json');
            const t = (b.targets ?? []).find((t) => t.name === '${{ matrix.target }}');
            console.log(t && t.ignoreStatic ? '--ignoreStatic' : '');
          ")
          echo "mutate=$PATTERN" >> "$GITHUB_OUTPUT"
          echo "ignore_static=$IGNORE_STATIC" >> "$GITHUB_OUTPUT"
      - name: Stryker round (${{ matrix.target }})
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        working-directory: projects/silver-core-sdk
        run: npx stryker run --mutate "${{ steps.pattern.outputs.mutate }}" ${{ steps.pattern.outputs.ignore_static }}
      - name: Ratchet check
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        working-directory: projects/silver-core-sdk
        run: node scripts/check-mutation-ratchet.mjs --name "${{ matrix.target }}"
      - name: Upload mutation report
        if: ${{ always() && (!github.event.inputs.target || github.event.inputs.target == matrix.target) }}
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-${{ matrix.target }}
          path: projects/silver-core-sdk/reports/mutation/mutation.json
          retention-days: 30

  # Same ratchet, maestro package (silver-core-maestro-sdk, monorepo
  # phase 1). Own baseline file + own check-script copy: the two packages
  # share no code by decree (SCS-REQ orchestrator-sdk §2), and CI tooling
  # follows the same one-way discipline.
  ratchet-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [ledger-state, schedule-spec, workflow-graph, goal-decision, delivery-channel, workflow-load]
    # Same per-step gate as the ratchet job above (audit H4): matrix legs
    # cannot be pruned at job level, and an echo+exit-0 step skips nothing.
    steps:
      - uses: actions/checkout@v7
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        with:
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v4
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        with:
          node-version: '20'
      - name: Install dependencies (workspace root)
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        run: npm ci
      - name: Build agent SDK (workspace dependency of the e2e tests)
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        run: npm run build --workspace silver-core-agent-sdk
      - name: Build orchestrator SDK
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        run: npm run build --workspace silver-core-maestro-sdk
      - name: Resolve mutate pattern from the baseline
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        id: pattern
        working-directory: projects/silver-core-maestro-sdk
        run: |
          PATTERN=$(node -e "
            const b = require('./mutation-ratchet.json');
            const t = (b.targets ?? []).find((t) => t.name === '${{ matrix.target }}');
            if (!t) { console.error('unknown target ${{ matrix.target }} in mutation-ratchet.json'); process.exit(2); }
            console.log(t.mutate);
          ")
          echo "mutate=$PATTERN" >> "$GITHUB_OUTPUT"
      - name: Stryker round (${{ matrix.target }})
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        working-directory: projects/silver-core-maestro-sdk
        run: npx stryker run --mutate "${{ steps.pattern.outputs.mutate }}"
      - name: Ratchet check
        if: ${{ !github.event.inputs.target || github.event.inputs.target == matrix.target }}
        working-directory: projects/silver-core-maestro-sdk
        run: node scripts/check-mutation-ratchet.mjs --name "${{ matrix.target }}"
      - name: Upload mutation report
        if: ${{ always() && (!github.event.inputs.target || github.event.inputs.target == matrix.target) }}
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-maestro-${{ matrix.target }}
          path: projects/silver-core-maestro-sdk/reports/mutation/mutation.json
          retention-days: 30
