name: Discord Discover Guilds

# 一次性发现工具：列出 bot 当前加入的所有服务器，对照已登记清单，高亮「未登记」服务器，
# 把快照写入 discord/guilds_seen.json 并提交。只读 API，不抓消息。
# T62 P2-3c 已切换（2026-07-19）：写 **BIAV-SC-DATA**（discord_list_guilds 经 discord_root() 分仓桥接）。
on:
  workflow_dispatch:

concurrency:
  group: discord-discover-guilds-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read   # 只读 code 仓脚本；写 data 仓走 PAT

env:
  BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo

jobs:
  discover:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code repo（sparse 脚本，不取数据）
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Clone BIAV-SC-DATA（PAT，数据根）
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: List bot guilds
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python projects/news/scripts/discord_list_guilds.py

      - name: Commit snapshot if changed → BIAV-SC-DATA
        run: |
          set -euo pipefail
          cd data-repo
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/discord/guilds_seen.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: snapshot Discord guild list (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
