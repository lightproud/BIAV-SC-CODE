name: Discord Probe (read-only connectivity test)

# 临时只读探针：验证 bot 在指定 guild 的接入状态。
# 不写盘、不提交、不触碰 Global 数据。可在任意分支手动触发。
on:
  workflow_dispatch:
    inputs:
      guild_id:
        description: '待探测的 guild_id'
        required: true
        default: '1402537664619479100'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run read-only probe
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ github.event.inputs.guild_id }}
        run: python projects/news/scripts/discord_probe.py
