name: Discord Cold Compress

# 月度压冷（守密人 2026-07-12 甲案裁定）：每到新月份，把上上个月及更早的
# discord dated JSONL 压成 .jsonl.gz（当月 + 上月保持裸文本热层）。幂等可重入。
# T62 P2-3c 已切换（2026-07-19）：操作 **BIAV-SC-DATA** 的 discord 存量
# （discord_cold_compress 经 discord_root() 分仓桥接），提交推 data 仓。
on:
  schedule:
    - cron: '23 3 2 * *'   # 每月 2 日 03:23 UTC（错峰归档器整点轮）
  workflow_dispatch:
    inputs:
      cutoff:
        description: '冷月上界 YYYY-MM（不含；留空 = 上月）'
        required: false
        default: ''

concurrency:
  group: discord-cold-compress
  cancel-in-progress: false

permissions:
  contents: read   # 只读 code 仓脚本；写 data 仓走 PAT

env:
  BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code repo（sparse 脚本，不取数据）
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone BIAV-SC-DATA（PAT，数据根）
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Run cold compress
        run: |
          if [ -n "${{ github.event.inputs.cutoff }}" ]; then
            python3 projects/news/scripts/discord_cold_compress.py --cutoff "${{ github.event.inputs.cutoff }}"
          else
            python3 projects/news/scripts/discord_cold_compress.py
          fi

      - name: Commit and push if changed → BIAV-SC-DATA
        run: |
          set -euo pipefail
          cd data-repo
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add -A Record/Community/discord/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data(discord): monthly cold compress (T62 P2-3c)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
