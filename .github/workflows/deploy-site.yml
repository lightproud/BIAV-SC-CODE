# Auto-deploy site + wiki + news + bpt-web to GitHub Pages
# Art assets downloaded from Release at build time (not stored in git)
name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'projects/site/**'
      - 'projects/wiki/docs/**'
      - 'projects/wiki/package.json'
      - 'projects/news/index.html'
      - 'deliverables/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Download art assets from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading art assets from unpacked-assets Release..."
          # 资产 Release 已由 consolidate-releases.yml(2026-06-21)合并：
          # 旧 art-assets-v2 / audio-assets-v1 / video-assets-v1 → 统一 unpacked-assets
          cd projects/wiki/docs/public
          gh release download unpacked-assets \
            -p "morimens-cg-full.tar.gz" \
            -p "morimens-icons-full.tar.gz" \
            -p "morimens-units.tar.gz" \
            -p "morimens-portraits-full.tar.gz" \
            -p "morimens-uiresources.tar.gz"
          echo "Extracting art tarballs..."
          tar xzf morimens-cg-full.tar.gz && rm morimens-cg-full.tar.gz
          tar xzf morimens-icons-full.tar.gz && rm morimens-icons-full.tar.gz
          tar xzf morimens-units.tar.gz && rm morimens-units.tar.gz
          tar xzf morimens-portraits-full.tar.gz && rm morimens-portraits-full.tar.gz
          tar xzf morimens-uiresources.tar.gz && rm morimens-uiresources.tar.gz
          [ -d portrait ] && mv portrait portrait-card
          echo "Downloading audio/video assets..."
          gh release download unpacked-assets \
            -p "morimens-audio-ogg-part1.tar.gz" \
            -p "morimens-audio-ogg-part2.tar.gz" \
            -p "morimens-video.tar.gz"
          echo "Extracting audio/video tarballs..."
          mkdir -p audio video
          tar xzf morimens-audio-ogg-part1.tar.gz && rm morimens-audio-ogg-part1.tar.gz
          tar xzf morimens-audio-ogg-part2.tar.gz && rm morimens-audio-ogg-part2.tar.gz
          tar xzf morimens-video.tar.gz && rm morimens-video.tar.gz
          # Move files to expected directories if tarballs extract differently
          # (adjust based on actual tarball structure)
          find . -maxdepth 2 -name "*.ogg" -not -path "./audio/*" -exec mv {} audio/ \; 2>/dev/null || true
          find . -maxdepth 2 -name "*.mp4" -not -path "./video/*" -exec mv {} video/ \; 2>/dev/null || true
          echo "Asset directories:"
          for d in cg icon bunit munit portraits uiresources scenebg portrait-card audio video; do
            if [ -d "$d" ]; then
              count=$(find "$d" -type f | wc -l)
              size=$(du -sh "$d" | cut -f1)
              echo "  $d: $count files ($size)"
            fi
          done

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/wiki/package-lock.json

      - name: Install wiki dependencies
        working-directory: projects/wiki
        run: npm ci

      - name: Regenerate wiki pages with media assets
        run: python scripts/generate_wiki_pages.py

      - name: Build wiki
        working-directory: projects/wiki
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p dist/wiki dist/news

          cp -r projects/site/public/. dist/
          [ -d projects/site/design ] && cp -r projects/site/design dist/design
          cp -r projects/wiki/docs/.vitepress/dist/* dist/wiki/
          cp projects/news/index.html dist/news/index.html
          mkdir -p dist/news/data
          [ -f projects/news/output/news.json ] && cp projects/news/output/news.json dist/news/data/news.json
          mkdir -p dist/docs
          [ -f "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.html" ] && cp "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.html" dist/docs/brain-in-a-vat-project.html
          [ -f "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.pdf" ] && cp "deliverables/2026-03/缸中之脑计划 Brain in a Vat Project.pdf" dist/docs/brain-in-a-vat-project.pdf
          touch dist/.nojekyll

      - name: Verify build output
        run: |
          echo "=== dist root ==="
          ls -la dist/
          echo ""
          echo "=== index.html title ==="
          grep '<title>' dist/index.html
          echo ""
          for f in dist/index.html dist/wiki/index.html dist/news/index.html; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f" && exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done
          echo "Total files: $(find dist -type f | wc -l)"

      - name: Enhanced build verification
        run: |
          echo "=== Checking HTML files are not empty ==="
          for f in $(find dist -name '*.html'); do
            if ! grep -q '<html' "$f" 2>/dev/null; then
              echo "WARNING: $f may be empty or corrupted"
            else
              echo "OK: $f"
            fi
          done
          echo ""
          echo "=== Checking wiki locale directories ==="
          # zh is the root locale via VitePress rewrites (zh/:rest* → :rest*)
          if [ -f "dist/wiki/index.html" ]; then
            echo "OK: dist/wiki/ (zh root) exists ($(find dist/wiki -maxdepth 1 -name '*.html' | wc -l) html files at root)"
          else
            echo "WARNING: dist/wiki/index.html missing"
          fi
          for locale in en ja; do
            if [ -d "dist/wiki/$locale" ]; then
              echo "OK: dist/wiki/$locale/ exists ($(find dist/wiki/$locale -type f | wc -l) files)"
            else
              echo "WARNING: dist/wiki/$locale/ missing"
            fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Post-deploy smoke test
        continue-on-error: true
        run: |
          echo "Waiting 30s for GitHub Pages to propagate..."
          sleep 30
          BASE="https://lightproud.github.io/brain-in-a-vat"
          # zh content is at /wiki/ root (via VitePress rewrites), not /wiki/zh/
          for url in "$BASE/" "$BASE/wiki/" "$BASE/wiki/en/" "$BASE/news/"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "OK: $url → $status"
            else
              echo "WARNING: $url → $status (may need more time to propagate)"
            fi
          done
