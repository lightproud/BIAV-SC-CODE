name: Discord archive → BIAV-SC-DATA (objective-A pilot)

# 分仓阶段二 · 目标 A（止增长）单点试点：验证「采集器经 env 数据根写 BIAV-SC-DATA、
# 经 PAT 推送」的机制——**不碰运行中的 discord-archive.yml**（live 采集照常写 code 仓）。
# 本试点把 discord_archiver 指向 BIAV-SC-DATA 的 checkout（env BIAV_SC_DATA_ROOT），
# 新采 discord 数据落 data 仓、提交推 data 仓；code 仓全程不动。
#
# 一次性验证性质：若之后 data-repo-sync.yml（code→data 镜像 rsync --delete）再跑，会覆盖
# 本试点在 data 仓的独有新增——这正是 P2-3 真切换时须停 mirror sync 的信号，试点阶段可接受。
#
# 前置 secret：DISCORD_BOT_TOKEN（现有）+ BIAV_SC_DATA_TOKEN（阶段一已配）。

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '输入 PILOT 确认跑目标 A 试点（写 BIAV-SC-DATA）'
        required: true
        default: ''

permissions:
  contents: read

concurrency:
  group: discord-archive-datarepo-pilot
  cancel-in-progress: false

jobs:
  pilot:
    if: github.event.inputs.confirm == 'PILOT'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code repo（仅脚本，不取数据）
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            projects/news/scripts
            scripts
          sparse-checkout-cone-mode: true
          path: code-repo

      - name: Clone BIAV-SC-DATA（PAT，含现有 discord 供增量续采）
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: 采集 discord → data 仓（env 数据根切远端）
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # 关键：数据根指向 data 仓 checkout（扮演 Public-Info-Pool 角色，含 Record/）
          BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo
        run: |
          set -euo pipefail
          cd code-repo
          # discord_archiver 经 archive_layout.discord_root() 解析 = $BIAV_SC_DATA_ROOT/Record/Community/discord
          python projects/news/scripts/discord_archiver.py || {
            echo "::error::采集失败"; exit 1; }

      - name: 提交推送新数据 → BIAV-SC-DATA
        run: |
          set -euo pipefail
          cd data-repo
          git config user.email "lightproud@hotmail.com"
          git config user.name "Erica (BIAV-SC)"
          git add Record/Community/discord/
          if git diff --cached --quiet; then
            echo "本轮无新 discord 数据（增量为空），机制验证仍成立（采集器成功写 data 仓路径）"
            exit 0
          fi
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "data: discord archive via objective-A pilot (T62 P2-2, $COUNT paths)"
          git push origin HEAD:main
          echo "已推 $COUNT 路径新 discord 数据至 BIAV-SC-DATA —— 目标 A 机制验证通过"
