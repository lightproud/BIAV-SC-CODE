name: Build OKF Bundle

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_okf_bundle.py'
      - 'projects/wiki/data/processed/characters.json'
      - 'projects/news/output/source-health.json'
  # 丙（守密人 2026-07-06）：sources 层派生自每小时更新的社区档案，push-path 触发盖不住
  # 数据演进带来的层漂移（新平台/新档案指针）。每日重建一次把 committed bundle 同步上来，
  # 兜住 test_kb_governance（该测试在 sparse-checkout CI 下跳过、只本地全量现形，见其注释）。
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

concurrency:
  group: okf-bundle-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regenerate OKF bundle
        run: python scripts/build_okf_bundle.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add okf/
          if git diff --staged --quiet; then
            echo "OKF bundle already up to date"
          else
            git commit -m "chore: rebuild OKF bundle [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
