name: Build OKF Bundle

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_okf_bundle.py'
      - 'projects/wiki/data/processed/characters.json'
      - 'projects/news/output/source-health.json'
  workflow_dispatch:

concurrency:
  group: okf-bundle-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Regenerate OKF bundle
        run: python scripts/build_okf_bundle.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add okf/
          if git diff --staged --quiet; then
            echo "OKF bundle already up to date"
          else
            git commit -m "chore: rebuild OKF bundle [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
