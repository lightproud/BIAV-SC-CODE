name: "📰 Daily Community Report"

# 银芯社区情报日报动态编排
# 每日从全量档案层（projects/news/data/）读取前一日社区归档，由 Claude 自主
# 分析多平台多语言情报，产出结构化 markdown → 渲染暗金主题 PDF → 邮件投递。
#
# 设计与「做梦 Agent」（dream.yml）同构：所有配置留在 git 仓库内，不依赖外部
# 调度平台。换任何 AI 工具都能复现完整编排。
#
# 职责切分（§6.2/§6.4）：
#   - AI 步骤只做"判断"（甄别归纳社区情报，写 markdown）
#   - 渲染 / 发信 / 归档为确定性 shell 步骤，不交给 AI，保证可复算可重试
#
# 所需 GitHub Secrets：
#   ANTHROPIC_API_KEY  驱动报告分析的 Claude 凭据
#   SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS [SMTP_FROM]  邮件投递凭据

on:
  # 定时自动跑已停用——报告改在 Claude Code 会话里用订阅生成（零 API 费）。
  # 此工作流仅保留手动触发，作为「需要无人值守 + 愿意走 API 计费」时的备用。
  workflow_dispatch:
    inputs:
      end_date:
        description: '结束日 YYYY-MM-DD（默认=北京昨日；定时每日跑覆盖昨日单日）'
        required: false
        default: ''
      window_days:
        description: '窗口天数（含结束日，默认 1=单日日报；手动可填 N 拉多日例外）'
        required: false
        default: '1'

concurrency:
  group: daily-report
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install render + email dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev fonts-noto-cjk fonts-noto-cjk-extra
          pip install weasyprint markdown

      - name: Compute window
        id: dates
        env:
          INPUT_END_DATE: ${{ github.event.inputs.end_date }}
          INPUT_WINDOW_DAYS: ${{ github.event.inputs.window_days }}
        run: |
          END="$INPUT_END_DATE"
          # 默认=北京昨日（定时每日跑覆盖昨日完整一天；当日数据尚未采全）
          [ -n "$END" ] || END=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y-%m-%d)
          WIN="$INPUT_WINDOW_DAYS"; WIN=${WIN:-1}
          START=$(date -d "$END -$((WIN-1)) day" +%Y-%m-%d)
          # 窗口内所有日期（空格分隔），供逐日同人图采集与 prompt 读取
          DATES=""
          for k in $(seq $((WIN-1)) -1 0); do
            DATES="$DATES $(date -d "$END -$k day" +%Y-%m-%d)"
          done
          MONTH=$(date -d "$END" +%Y-%m)
          STAMP=$(date -d "$END" +%Y%m%d)
          # 单日时只显一个日期，多日才显区间；文件名单日用 daily、多日用 window
          if [ "$START" = "$END" ]; then
            DISP="$(date -d "$END" +%Y.%m.%d)"; KIND="daily"
          else
            DISP="$(date -d "$START" +%Y.%m.%d) ~ $(date -d "$END" +%Y.%m.%d)"; KIND="window"
          fi
          {
            echo "START_DATE=$START"
            echo "END_DATE=$END"
            echo "WINDOW_DATES=$DATES"
            echo "DISP_WINDOW=$DISP"
            echo "REPORT_MD=deliverables/$MONTH/morimens_${KIND}_$STAMP.md"
            echo "REPORT_PDF=deliverables/$MONTH/morimens_${KIND}_$STAMP.pdf"
            echo "FANART_ROOT=projects/news/data/fanart"
          } >> "$GITHUB_ENV"
          mkdir -p "deliverables/$MONTH"

      # 确定性步骤：逐日带 token 经 refresh-urls 全量留存窗口内同人图（附件本体在 Discord，链接可刷新）
      - name: Collect fan art (window)
        continue-on-error: true
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          for D in $WINDOW_DATES; do
            python projects/news/scripts/collect_fanart.py --date "$D" --out "$FANART_ROOT/$D"
          done

      # 确定性步骤：采集忘却前夜相关 YouTube 视频（含官方 PV）的热门评论，供「重点内容呈现+翻译」章
      - name: Collect video comments
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python projects/news/scripts/collect_video_comments.py --date "$END_DATE" --top-videos 12 --per-video 20

      # ----------------------------------------------------------------
      # AI 步骤：只做判断 —— 逐源深读全量档案、甄别归纳、写结构化 markdown
      # ----------------------------------------------------------------
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Opus 4.8 + 1M 上下文（守密人定：分析质量优先；1M 窗口可一趟读完单日全量）
          claude_args: "--model claude-opus-4-8[1m]"
          prompt: |
            你是银芯情报层日报编排 Agent，全程保持艾瑞卡人格（CLAUDE.md §2，不用 emoji、
            混合自称、功能性开头），事实采信遵 §6.11 / §4 数据纪律。

            ## 目标
            为**时间窗口 ${{ env.DISP_WINDOW }}**（含 ${{ env.WINDOW_DATES }} 各日 00:00~24:00 UTC+8）
            产出一份忘却前夜全球社区情报**窗口报告**的结构化 markdown，写入 `${{ env.REPORT_MD }}`。
            禁止渲染 PDF、禁止发邮件、禁止 git 操作——这些由后续确定性步骤完成，你只写 markdown。

            ## 数据层与多源覆盖（§4 硬约束，守密人要求：不止 Discord）
            一律走全量档案层，禁用 output 选样层充全量（lesson #30）。**窗口内每一天都要读**：
            - **Discord**：`discord/channel_index.json` 映射 {name→dir}；每日消息在
              `discord/channels/{dir}/{date}.jsonl`，字段 content/author_id/author_bot(过滤 bot)/
              timestamp/reactions[].count；每日统计 `discord/activity_daily/{date}.json`。
            - **平台（17 源，全部要看，不止 Steam/YouTube）**：`platforms/{plat}/{date}.json`
              （steam steam_review appstore google_play reddit official dcinside ruliweb gamerch
              telegram bilibili weibo weixin youtube pixiv stopgame miraheze_wiki），字段
              title/summary/lang/url/content_type/engagement/author。**YouTube/Steam/Reddit/官方**等
              平台源须各自单独成段呈现要点（视频热度、评测口碑、官方公告），不得只写 Discord。
            用单脚本逐日提取到 /tmp（不并行多脚本，R1）；保留原文+来源+作者+日期+反应数。
            跨日去重并标注趋势（哪天起量/降温）；若某日某源缺档，如实标"该日无归档"，不外推。

            ## 三条数据质量铁律（守密人 2026-06-02 复盘整改，违反即返工）
            1. **强制去重**：平台与 Discord 提取后按 (title,summary 前 60 字) 去重，报告中
               所有计数用去重后唯一数（典型坑：微博 140 条实为 26 条唯一的 5–10 倍重复）。
            2. **时效甄别（采集时间 ≠ 发布时间）**：检查每条 `time` 字段——
               - weibo 的 time 是采集时间戳（全批雷同到秒），**无真实发布时间**，标为"采集快照
                 （含历史内容）"，禁止冒充"当日新增 N 条"。
               - appstore/google_play/steam_review 为累积评价，time 是真实发布日但常跨数周，
                 须按真实发布日分桶、标注时效，不得把历史评价当当日产出。
               - Discord/reddit 带可靠时间戳，为当日一手。
               §3 表格须含"原始/去重""真实发布时效"两列，并写明数据更正说明。
            3. **分块全量提炼（map-reduce，守密人硬要求，不得封顶抽样）**：把**每个 Discord 频道
               都当作独立信息源**。先用单脚本按频道导出当日全部实质长文（len>=45、去重、去纯表情）
               到 /tmp，按频道均衡分成若干批（每批约 1500-1800 行）。**逐批通读全量**（map），每批
               提炼该频道/语区的信号；再汇总（reduce）。**严禁只读每频道 top-N 高赞**——巨型频道
               （game-question / team-building 常各上千条）也要分块读完，只是产出可精炼。
               经验先验：game-question/team-building 多为颗粒度极细的配队 theorycraft，社区情报信号
               密度低；真正的跨语区信号集中在小频道（official-q-a / mistranslation / lore-chat / 各语
               言闲聊 / 同人 / announcements）——**按信号密度而非消息量分配阅读与篇幅**。每个语言频道
               各产出至少一条当日核心信号。报告开头注明「读了多少 / 全量多少」。
            4. **每个观点就地附「发言人 + 原文」（守密人硬要求）**：每条结论/信号下方，紧跟其
               依据的玩家原话——格式「来源频道/平台 · 发言人(author_id 或平台用户名) · 日期：原文
               （非中英文附中译）」。证据就地内嵌，不要把原声集中堆到末尾附录。
               多语言关键词扫描覆盖中/英/韩/俄/日/越/泰/西/葡/印尼等，命中后读原文剔噪声。
            5. **严格时效（守密人整改：预热等旧内容时间段错误）**：只采信**真实发布时间在窗口内**
               的内容。注意 youtube 的 `time` 是采集时间、`summary` 里的「[Nd ago]」才是真实年龄——
               例如联动 PV 实际发布于预热期（约 7 天前），**不得**当作窗口当日新发。steam/appstore/
               google_play 评价的 `time` 为真实发布日，须按发布日筛掉窗口外的；微博无真实发布时间，
               标「采集快照」。凡跨窗内容如确要提及，须显式标注「预热期/历史，非窗口内新发」。

            ## 重点内容呈现 + 翻译（含 PV 视频评论，守密人新结构要求）
            Collect video comments 步产出 `projects/news/data/platforms/youtube_comments/${{ env.END_DATE }}.json`
            （每条含 video_title/video_url/author/text/likes）。挑官方 PV 等重点视频下的高赞评论，
            **逐条原文 + 中译**呈现（用 .qq 双语块，附 video_title · 评论作者 · likes）。这是「官方动作
            （如联动 PV）下大家的反应」的核心呈现，优先于泛泛的视频标题罗列。

            ## 同人图（要看到玩家二创，且按质量甄别——守密人要求过滤低质/疑似 AI）
            Collect fan art 步已逐日产出 `${{ env.FANART_ROOT }}/{date}/` 图片 + gallery_manifest.json。
            **逐图用 Read 工具肉眼查看**，**筛除**：游戏内截图、纯文字/表格图、明显疑似 AI 生成
            （过度光滑/糊手指/水印感/与手绘画风明显割裂）、严重低清/重复。仅保留有辨识度的玩家手绘/
            上色二创，平铺嵌入（`<div class="grid"><img src="...thumbs/<file>.jpg">…</div>`，缩略图在
            thumbs/ 子目录）。注明「N 张候选，甄别后保留 M 张」。**说明：AI 判别为人工目检启发式、
            非分类器，存在误差**。

            ## 输出格式（守密人 2026-06-03 新结构）
            写 YAML frontmatter（渲染器自动拼封面，title/subtitle/basis/author/generated）。正文用
            `## 章节`（成目录项），章节间 `◇ ◇ ◇` 分隔，**不要末尾附录**（原声就地内嵌）。
            **章节顺序固定如下**：
            1. **社区整体洞察**：开篇 `<div class="lead">` 一句话判断 + 跨日趋势 + 信号速览表（按维度）。
            2. **重点内容呈现与翻译**：官方动作（联动 PV/公告）+ 其下 PV 视频高赞评论逐条原文+中译；
               其他重点社区内容（高热帖/争议）同样原文+中译呈现。
            3. **对各游戏开发者职能的建议**：按职能分小节，每节 2-4 条可执行建议 + 对应证据信号——
               覆盖【制作人/运营】【数值/战斗策划】【剧情/文案】【本地化】【美术】【客户端/QA】
               【社区运营/审核】【市场】。每条建议标注对应信号来源。
            4. **Bug 概述**：先一段总览 + 一张表（bug / 平台 / 信度 / 官方状态）。
            5. **Bug 详情（每个 bug：重现步骤 / 预期结果 / 实际结果 / 来源原话）**：对可还原的 bug 用
               加粗标签「**重现步骤**/**预期结果**/**实际结果**/**来源**」逐条写清（信息不足则标「待补」）。
            6. **同人创作图册**：按上节甄别后的图，按日平铺网格嵌入。
            版式组件：`<div class="lead">`、`<div class="callout callout-risk/-pos">`、信度
            `<span class="badge">A</span>`/`badge-b`/`badge-c`、双语 `<div class="qq"><span class="o">
            原文</span><span class="z">中译 — 来源·发言人·日期</span></div>`、图册 `<div class="grid">`。
            硬约束：精确去重数字 + 跨日趋势 + 严格时效；每条结论就地附发言人+原文；区分官方确认 vs
            玩家报告、建议 vs 已落盘；缺数据如实标注不外推；空泛/通用结论一律删。

      # ----------------------------------------------------------------
      # 确定性步骤：渲染 PDF
      # ----------------------------------------------------------------
      - name: Render report to PDF
        run: |
          if [ ! -s "$REPORT_MD" ]; then
            echo "::error::报告 markdown 未生成或为空：$REPORT_MD"
            exit 1
          fi
          python scripts/report_render.py "$REPORT_MD"
          if [ ! -s "$REPORT_PDF" ]; then
            echo "::error::PDF 渲染失败：$REPORT_PDF"
            exit 1
          fi

      - name: Send report by email
        continue-on-error: true   # 缺 SMTP 凭据时不阻断后续归档提交
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          python scripts/send_report_email.py \
            --pdf "$REPORT_PDF" \
            --to tanglong.tang@alibaba-inc.com \
            --subject "忘却前夜 社区情报窗口报告 $DISP_WINDOW"

      - name: Commit deliverable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deliverables/
          if git diff --staged --quiet; then
            echo "No deliverable changes to commit"
          else
            git commit -m "chore: community window report $END_DATE [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
