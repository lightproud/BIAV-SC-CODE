name: Silver Core Maestro SDK

# Node/TypeScript CI for projects/silver-core-maestro-sdk (silver-core-maestro-sdk)
# plus the monorepo dependency-direction guard (SCS-REQ orchestrator-sdk §2:
# orchestrator -> agent one-way, machine-enforced). The guard also watches
# agent-SDK changes, because a reverse import would appear on that side.

on:
  push:
    branches: [main]
    paths:
      - 'projects/silver-core-maestro-sdk/**'
      - 'projects/silver-core-sdk/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/silver-core-maestro-sdk.yml'
      - '.github/scripts/check-dep-direction.mjs'
  # NO pull_request paths filter (keeper ruling 2026-07-18, option ②): this job
  # is the family INTEGRATION gate (agent build + maestro suite + testbed
  # consumer contract) and is meant to be a REQUIRED status check. A required
  # check behind a paths filter deadlocks docs-only PRs on "Expected — waiting
  # for status" (the exact 2026-06-21 failure mode). Sparse checkout keeps it
  # cheap; it always runs and always reports so the Ruleset can require it.
  pull_request:

concurrency:
  group: silver-core-maestro-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dep-direction:
    name: Maestro dep-direction
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Dependency-direction guard (orchestrator -> agent one-way)
        run: node .github/scripts/check-dep-direction.mjs

  unit:
    # Unique display name so the required-status-check list is unambiguous
    # (the agent SDK workflow also has a job id `unit`).
    name: Maestro unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            /*
            !/Public-Info-Pool/Record/
            !/Public-Info-Pool/Reference/
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies (workspace root)
        run: npm ci
      - name: Build agent SDK (workspace dependency)
        run: npm run build --workspace silver-core-agent-sdk
      - name: Typecheck
        run: npm run typecheck --workspace silver-core-maestro-sdk
      - name: Build
        run: npm run build --workspace silver-core-maestro-sdk
      - name: Test
        run: npm test --workspace silver-core-maestro-sdk
      - name: Testbed consumer contract (both packages combined, third-party consumer)
        # The family combination gate (keeper ruling 2026-07-18 ①): silver-core-
        # testbed is a non-family third-party consumer that resolves BOTH packages
        # from the workspace (the freshly-built agent + maestro above) and asserts
        # the public-surface contract. Catches consumer-facing breakage that each
        # package's own suite cannot see. Fast (~2s, no build — pure .mjs vitest).
        run: npm test --workspace silver-core-testbed
      - name: Publishability (dry-run pack, both packages independently)
        run: |
          npm pack --dry-run --workspace silver-core-agent-sdk
          npm pack --dry-run --workspace silver-core-maestro-sdk
