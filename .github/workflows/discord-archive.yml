name: Discord Archive

on:
  schedule:
    # Incremental: daily at 18:00 UTC (per news/CONTEXT.md 2026-04-11 policy)
    - cron: '0 7 * * *'
    # Monthly cleanup: 1st of each month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: incremental (default) / monthly-cleanup / force-month'
        required: false
        default: 'incremental'
      force_month:
        description: 'When mode=force-month: YYYY-MM to archive (bypasses 60-day cutoff). Comma-separated for multiple.'
        required: false
        default: ''

concurrency:
  group: discord-archive-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Determine run mode
        id: mode
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$INPUT_MODE" = "force-month" ]; then
            echo "mode=force" >> $GITHUB_OUTPUT
          elif [ "$EVENT_SCHEDULE" = "0 6 1 * *" ] || [ "$INPUT_MODE" = "monthly-cleanup" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Run Discord archiver (incremental)
        if: steps.mode.outputs.mode == 'incremental'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python projects/news/scripts/discord_archiver.py

      - name: Backfill forum thread starters (catches up legacy gap)
        if: steps.mode.outputs.mode == 'incremental'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RUNTIME_BUDGET: '3600'
          RATE_LIMIT_SLEEP: '0.2'
        # Idempotent: tracks progress in state.forum_starter_backfill, skips
        # already-completed threads, exits when budget hit. 60-min budget +
        # 0.2s sleep yields ~18000 threads per dispatch, enough for the full
        # 8420-thread legacy gap to clear in a single workflow run. Falls back
        # to incremental top-up after the catch-up finishes.
        run: python projects/news/scripts/backfill_forum_starters.py

      - name: Run monthly cleanup (archive old data to Releases)
        if: steps.mode.outputs.mode == 'monthly'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python projects/news/scripts/archive_discord.py

      - name: Run force-month archive (manual stop-bleed)
        if: steps.mode.outputs.mode == 'force'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_MONTH_INPUT: ${{ github.event.inputs.force_month }}
        run: |
          if [ -z "$FORCE_MONTH_INPUT" ]; then
            echo "ERROR: mode=force-month requires force_month input (e.g. 2026-03)"
            exit 1
          fi
          FLAGS=""
          IFS=',' read -ra MONTHS <<< "$FORCE_MONTH_INPUT"
          for m in "${MONTHS[@]}"; do
            m_trimmed="$(echo "$m" | tr -d '[:space:]')"
            [ -n "$m_trimmed" ] && FLAGS="$FLAGS --force-month $m_trimmed"
          done
          echo "Running: python projects/news/scripts/archive_discord.py $FLAGS"
          python projects/news/scripts/archive_discord.py $FLAGS

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Public-Info-Pool/Record/Community/discord/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MSG="chore: archive Discord data [skip ci]"
            if [ "${{ steps.mode.outputs.mode }}" = "monthly" ]; then
              MSG="chore: monthly Discord cleanup — old JSONL moved to Releases [skip ci]"
            elif [ "${{ steps.mode.outputs.mode }}" = "force" ]; then
              MSG="chore: force-month Discord cleanup — JSONL moved to Releases [skip ci]"
            fi
            git commit -m "$MSG"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in ${i}s..."
              sleep $i
            done
            echo "All push attempts failed"
            exit 1
          fi
