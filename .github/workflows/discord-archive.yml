name: Discord Archive

# T62 P2-3c 已切换（2026-07-19）：discord 采集写 **BIAV-SC-DATA**（不再写 code 仓）。
# 三个写脚本（discord_archiver / backfill_forum_starters / archive_engine）经 env
# BIAV_SC_DATA_ROOT 解析数据根 = data 仓 checkout；提交推 data 仓（PAT）。
# 月度 cleanup 的 Release 备份仍上传 code 仓 community-data 桶（gh --repo $GITHUB_REPOSITORY，
# 历史备份桶暂留 code 仓）。前置 secret：DISCORD_BOT_TOKEN + BIAV_SC_DATA_TOKEN。

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: incremental (default) / monthly-cleanup / force-month'
        required: false
        default: 'incremental'
      force_month:
        description: 'When mode=force-month: YYYY-MM (comma-separated for multiple).'
        required: false
        default: ''

concurrency:
  group: discord-archive-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read   # 只读 code 仓脚本；写 data 仓走 PAT

jobs:
  archive:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BIAV_SC_DATA_ROOT: ${{ github.workspace }}/data-repo
    steps:
      - name: Checkout code repo（sparse 脚本，不取数据）
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            projects/news
            scripts
          sparse-checkout-cone-mode: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r projects/news/requirements.txt

      - name: Clone BIAV-SC-DATA（PAT，数据根）
        env:
          DATA_TOKEN: ${{ secrets.BIAV_SC_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DATA_TOKEN:-}" ]; then
            echo "::error::secret BIAV_SC_DATA_TOKEN 未配置"; exit 1
          fi
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$DATA_TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git clone https://github.com/lightproud/BIAV-SC-DATA.git data-repo

      - name: Determine run mode
        id: mode
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$INPUT_MODE" = "force-month" ]; then
            echo "mode=force" >> $GITHUB_OUTPUT
          elif [ "$EVENT_SCHEDULE" = "0 6 1 * *" ] || [ "$INPUT_MODE" = "monthly-cleanup" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Run Discord archiver (incremental)
        if: steps.mode.outputs.mode == 'incremental'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python projects/news/scripts/discord_archiver.py

      - name: Backfill forum thread starters (catches up legacy gap)
        if: steps.mode.outputs.mode == 'incremental'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RUNTIME_BUDGET: '3600'
          RATE_LIMIT_SLEEP: '0.2'
        run: python projects/news/scripts/backfill_forum_starters.py

      - name: Run monthly cleanup (archive old data to Releases)
        if: steps.mode.outputs.mode == 'monthly'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python projects/news/scripts/archive_discord.py

      - name: Run force-month archive (manual stop-bleed)
        if: steps.mode.outputs.mode == 'force'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_MONTH_INPUT: ${{ github.event.inputs.force_month }}
        run: |
          if [ -z "$FORCE_MONTH_INPUT" ]; then
            echo "ERROR: mode=force-month requires force_month input (e.g. 2026-03)"
            exit 1
          fi
          FLAGS=""
          IFS=',' read -ra MONTHS <<< "$FORCE_MONTH_INPUT"
          for m in "${MONTHS[@]}"; do
            m_trimmed="$(echo "$m" | tr -d '[:space:]')"
            [ -n "$m_trimmed" ] && FLAGS="$FLAGS --force-month $m_trimmed"
          done
          echo "Running: python projects/news/scripts/archive_discord.py $FLAGS"
          python projects/news/scripts/archive_discord.py $FLAGS

      - name: Commit and push if changed → BIAV-SC-DATA
        run: |
          set -euo pipefail
          cd data-repo
          git config user.name "Erica (BIAV-SC)"
          git config user.email "lightproud@hotmail.com"
          git add Record/Community/discord/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          MSG="data: archive Discord data (T62 P2-3c)"
          if [ "${{ steps.mode.outputs.mode }}" = "monthly" ]; then
            MSG="data: monthly Discord cleanup — old JSONL backed up to Releases"
          elif [ "${{ steps.mode.outputs.mode }}" = "force" ]; then
            MSG="data: force-month Discord cleanup — JSONL backed up to Releases"
          fi
          git commit -m "$MSG"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
          echo "All push attempts failed"
          exit 1
