name: 数据缺失 / Data Gap
description: 报告 Wiki 数据集缺失（角色技能、命轮、皮肤、关卡、物品、卡池等）
title: "[data-gap] "
labels: ["data-gap", "wiki", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        本模板用于**报告**事实圣经或 Wiki 数据缺失，不负责补全。若已能补全数据，请改走 **fork + PR** 通道（见 `memory/contribution-protocol.md`）。

        强制要求：所有补全数据必须可追溯至**公开来源**（fandom / bilibili wiki / gamekee / 游戏内截图等）。**禁止使用未发布信息或内网/黑池资源。**

  - type: dropdown
    id: data-type
    attributes:
      label: 数据类型
      options:
        - character (角色)
        - wheel (命轮)
        - item (物品)
        - banner (卡池)
        - stage (关卡)
        - lore (世界观/剧情)
        - voice_lines (语音台词)
        - cg_gallery (CG 画廊)
        - 其他
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: 角色 / 项目名称
      description: 缺失数据所属的具体对象
      placeholder: "例：Daffodil（达芙黛尔） / 命轮·磷光裂变 / 第七章 H7-12"
    validations:
      required: true

  - type: textarea
    id: missing
    attributes:
      label: 缺失内容描述
      description: 哪些字段、属性、文本未填或不完整
      placeholder: |
        例：
        - 技能 2 描述为空
        - 命轮升星路径未列出
        - 三语 i18n 仅有 zh，en/ja 缺失
    validations:
      required: true

  - type: dropdown
    id: source-type
    attributes:
      label: 已知公开来源
      description: 该数据可从哪里查到（不是来自内网/未发布渠道）
      multiple: true
      options:
        - fandom
        - bilibili-wiki
        - gamekee
        - tap-wiki
        - 游戏内截图
        - 官方公告
        - 其他公开来源
        - 暂无可信来源（可能仍未公开）

  - type: input
    id: source-url
    attributes:
      label: 来源 URL（如有）
      description: 公开来源的可访问链接
      placeholder: "例：https://morimens.fandom.com/wiki/Daffodil"

  - type: textarea
    id: extra
    attributes:
      label: 附加信息
      description: 优先级、相关 Issue、补全建议等
