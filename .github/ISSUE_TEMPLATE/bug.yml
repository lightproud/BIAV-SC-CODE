name: Bug 报告 / Bug Report
description: 报告数据错误、链接死链、显示异常或部署故障
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你协助维护项目。本模板用于报告**已上线内容**的问题。
        若是缺失数据（角色资料未填、技能数值未补等），请改用 **[data-gap]** 模板。

        Issue 不再触发 Claude Code 自动响应（除作者为 `lightproud` 外）。所有社区 Issue 由守密人或委托成员人工审核。

  - type: dropdown
    id: surface
    attributes:
      label: 受影响载体
      description: 问题出现在哪一个站点或目录？
      options:
        - 主站 (lightproud.github.io/brain-in-a-vat/)
        - Wiki (/wiki/)
        - News (/news/)
        - BIAV 项目说明页 (/biav/)
        - 404 页面
        - Design 系统文档 (/design/)
        - 仓库代码 (源文件)
        - 自动化流水线 (GitHub Actions)
        - 其他
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: 具体 URL 或文件路径
      description: 出问题的页面 URL，或仓库内文件路径
      placeholder: "例：https://lightproud.github.io/brain-in-a-vat/wiki/zh/awakeners/  或  projects/wiki/data/db/characters.json"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简述发生了什么
      placeholder: "例：角色页面 X 的技能描述显示乱码 / 主站 nav 第 3 项链接 404"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何稳定触发该问题
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...

  - type: textarea
    id: expected
    attributes:
      label: 预期 vs 实际
      placeholder: |
        预期：...
        实际：...

  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: 浏览器 + 操作系统（仅当与显示/交互相关时）
      placeholder: "例：Chrome 134 / macOS 14"

  - type: textarea
    id: extra
    attributes:
      label: 附加信息
      description: 截图、控制台日志、相关链接等
